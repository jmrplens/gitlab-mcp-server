name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!

        > For **security vulnerabilities**, do NOT use this form — please use [GitHub Security Advisories](https://github.com/jmrplens/gitlab-mcp-server/security/advisories/new) instead.

  - type: checkboxes
    id: prereqs
    attributes:
      label: Prerequisites
      description: Please confirm before submitting
      options:
        - label: I have searched [existing issues](https://github.com/jmrplens/gitlab-mcp-server/issues?q=is%3Aissue) and this bug has not been reported.
          required: true
        - label: I have read the [README](https://github.com/jmrplens/gitlab-mcp-server#readme) and [troubleshooting guide](https://github.com/jmrplens/gitlab-mcp-server/blob/main/docs/troubleshooting.md).
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Brief description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., Windows 11, Ubuntu 24.04, macOS 15"
    validations:
      required: true

  - type: input
    id: server-version
    attributes:
      label: gitlab-mcp-server version
      description: Run `gitlab-mcp-server --version` or paste the binary tag/commit
      placeholder: "e.g., v1.3.4 or commit hash"
    validations:
      required: true

  - type: input
    id: gitlab-version
    attributes:
      label: GitLab version
      placeholder: "e.g., 17.0.0"
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version (only if building from source)
      placeholder: "e.g., 1.26.2"

  - type: dropdown
    id: mcp-client
    attributes:
      label: MCP Client
      options:
        - VS Code + Copilot
        - Cursor
        - Copilot CLI
        - OpenCode
        - Claude Desktop
        - Claude Code
        - Other (specify in Additional Context)
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio
        - HTTP
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste relevant stderr logs or error messages. Run with `LOG_LEVEL=debug` if possible.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, configuration snippets, related issues, etc.
