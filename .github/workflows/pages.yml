# Documentation site — MkDocs Material → GitHub Pages
#
# Triggers: push to main (docs or config changes), manual dispatch

name: Pages

on:
  push:
    branches: [main]
    paths:
      - "mkdocs.yml"
      - "site/docs/**"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - run: pip install mkdocs-material

      - run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
