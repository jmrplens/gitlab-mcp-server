# Documentation site — Astro Starlight → GitHub Pages
#
# Triggers: push to main (site changes), manual dispatch

name: Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "!site/node_modules/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - run: npm ci
        working-directory: site

      - run: npx astro build
        working-directory: site

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
