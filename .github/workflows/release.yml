# Release pipeline for gitlab-mcp-server
#
# Triggers: tag push matching v*
# Pipeline: E2E tests (Docker GitLab) → GoReleaser
# If E2E tests fail, the release is NOT created.
#
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26.2"

jobs:
  e2e:
    name: E2E Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Pull GitLab image
        run: docker pull gitlab/gitlab-ce:latest

      - name: Start GitLab via Docker Compose
        working-directory: test/e2e
        run: |
          docker compose up -d
          echo "GitLab container started — waiting for readiness..."

      - name: Wait for GitLab readiness
        working-directory: test/e2e
        run: bash scripts/wait-for-gitlab.sh
        timeout-minutes: 10

      - name: Setup GitLab user and token
        working-directory: test/e2e
        run: bash scripts/setup-gitlab.sh

      - name: Register GitLab Runner
        working-directory: test/e2e
        run: bash scripts/register-runner.sh

      - name: Load environment
        working-directory: test/e2e
        run: cat .env.docker >> "$GITHUB_ENV"

      - name: Run E2E tests
        run: |
          gotestsum \
            --junitfile test-results/e2e-junit.xml \
            --format standard-verbose \
            -- -v -tags e2e -timeout 600s -count=1 ./test/e2e/suite/
        env:
          E2E_MODE: "docker"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 14

      - name: Tear down GitLab
        if: always()
        working-directory: test/e2e
        run: docker compose down -v --remove-orphans

  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: [e2e]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
