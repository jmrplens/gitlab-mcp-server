# Release pipeline for gitlab-mcp-server
#
# Triggers: tag push matching v*
# Jobs: cross-compile 6 targets, create GitHub Release with assets
#
# Required secrets:
#   GITHUB_UPDATE_TOKEN  Token embedded in binaries for the auto-update feature (optional)

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26.2"
  BINARY_NAME: gitlab-mcp-server

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - run: go mod download

      - name: Build release binaries
        env:
          GITHUB_UPDATE_TOKEN: ${{ secrets.GITHUB_UPDATE_TOKEN }}
        run: ./scripts/build-release.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/${{ env.BINARY_NAME }}-linux-amd64
            dist/${{ env.BINARY_NAME }}-linux-arm64
            dist/${{ env.BINARY_NAME }}-windows-amd64.exe
            dist/${{ env.BINARY_NAME }}-windows-arm64.exe
            dist/${{ env.BINARY_NAME }}-darwin-amd64
            dist/${{ env.BINARY_NAME }}-darwin-arm64
            dist/checksums.txt
