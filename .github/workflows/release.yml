# Release pipeline for gitlab-mcp-server
#
# Triggers: tag push matching v*
# Pipeline: E2E → GoReleaser → Docker → MCP Registry
# If E2E tests fail, nothing is released.
#
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write

env:
  GO_VERSION: "1.26.2"
  REGISTRY: ghcr.io
  IMAGE_NAME: jmrplens/gitlab-mcp-server

jobs:
  e2e:
    name: E2E Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Pull GitLab image
        run: docker pull gitlab/gitlab-ce:latest

      - name: Start GitLab via Docker Compose
        working-directory: test/e2e
        run: |
          docker compose up -d
          echo "GitLab container started — waiting for readiness..."

      - name: Wait for GitLab readiness
        run: bash test/e2e/scripts/wait-for-gitlab.sh
        timeout-minutes: 10

      - name: Setup GitLab user and token
        run: bash test/e2e/scripts/setup-gitlab.sh

      - name: Register GitLab Runner
        run: bash test/e2e/scripts/register-runner.sh

      - name: Load environment
        run: cat test/e2e/.env.docker >> "$GITHUB_ENV"

      - name: Run E2E tests
        run: |
          gotestsum \
            --junitfile test-results/e2e-junit.xml \
            --format standard-verbose \
            -- -v -tags e2e -timeout 600s -count=1 ./test/e2e/suite/
        env:
          E2E_MODE: "docker"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 14

      - name: Tear down GitLab
        if: always()
        working-directory: test/e2e
        run: docker compose down -v --remove-orphans

  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    environment: release
    needs: [e2e]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: sigstore/cosign-installer@v4.1.1

      - uses: anchore/sbom-action/download-syft@v0

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update server.json with SHA256 hashes
        run: bash scripts/update-server-json-sha.sh dist/checksums.txt "${GITHUB_REF#refs/tags/v}"

      - name: Publish to MCP Registry
        continue-on-error: true
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

      - name: Commit updated server.json and plugin.json to main
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git fetch origin main
          git checkout main

          # Re-apply updates on top of latest main (the script is idempotent
          # and reads checksums.txt + version, so re-running produces the
          # same result as the artifact built earlier in this job).
          bash scripts/update-server-json-sha.sh dist/checksums.txt "${VERSION}"

          git add server.json
          [ -f .plugin/plugin.json ] && git add .plugin/plugin.json

          if git diff --cached --quiet; then
            echo "::notice::No manifest changes to commit"
            exit 0
          fi

          git commit -m "chore: update manifests for v${VERSION}

          Updates server.json (MCP Registry) and .plugin/plugin.json
          (Open Plugins) with version ${VERSION} and pinned SHA256 hashes."
          git push origin main

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [e2e]
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - uses: sigstore/cosign-installer@v4.1.1

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        id: docker-push
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            COMMIT=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Sign Docker image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.docker-push.outputs.digest }}

  fly-deploy:
    name: Fly.io Deploy
    runs-on: ubuntu-latest
    environment: release
    needs: [release, docker]
    # Skip silently if FLY_API_TOKEN secret is not configured.
    if: ${{ github.repository == 'jmrplens/gitlab-mcp-server' }}
    steps:
      - uses: actions/checkout@v6

      - name: Check FLY_API_TOKEN
        id: check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "${FLY_API_TOKEN}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::FLY_API_TOKEN not set — skipping Fly.io deployment."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract version
        if: steps.check.outputs.skip == 'false'
        id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: steps.check.outputs.skip == 'false'

      - name: Deploy to Fly.io
        if: steps.check.outputs.skip == 'false'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          fly deploy --remote-only \
            --config fly.toml \
            --build-arg VERSION=${{ steps.version.outputs.version }} \
            --build-arg COMMIT=${{ github.sha }} \
            --image-label v${{ steps.version.outputs.version }} \
            --strategy rolling

      - name: Verify deployment health
        if: steps.check.outputs.skip == 'false'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: fly status --config fly.toml
