# SonarQube Configuration for gitlab-mcp-server
# This file configures rule exclusions for Go-specific patterns that SonarQube
# flags incorrectly or too aggressively.

sonar.projectName=gitlab-mcp-server

# Source and test directories
sonar.sources=cmd,internal
sonar.tests=internal
sonar.test.inclusions=**/*_test.go

# Exclude non-code files that SonarQube cannot parse (e.g. VERSION triggers
# the C/C++ analyzer with "Expected unqualified-id").
sonar.exclusions=VERSION

# =============================================================================
# Rule Exclusions for Test Files
# =============================================================================
# These rules are suppressed in test files because they conflict with idiomatic
# Go test patterns.

# S1192: "Define a constant instead of duplicating this literal"
# In Go test files, table-driven tests and httptest mocks deliberately repeat
# string literals (API paths, URLs, error messages, test data) for readability.
# Extracting every repeated literal into a constant harms test clarity without
# meaningful quality improvement.
#
# S1186: "Add a nested comment explaining why this function is empty"
# Empty function bodies in httptest handler mocks are intentional — they simulate
# HTTP 200 OK responses. This is standard Go httptest practice:
#   http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {})
#
# S100: "Rename function to match the regular expression"
# Go test names use underscores by convention (TestFoo_Bar_Baz). This is the
# standard Go testing pattern documented at https://go.dev/doc/code#Testing.
# SonarQube's regex ^(_|[a-zA-Z0-9]+)$ does not accommodate Go conventions.
#
# S3776: "Refactor this method to reduce its Cognitive Complexity"
# Test helper functions that verify multiple fields of API responses naturally
# have higher complexity. Splitting them reduces test readability.
sonar.issue.ignore.multicriteria=t1,t2,t3,t4,g1,g2

# S1192 — duplicated string literals in tests
sonar.issue.ignore.multicriteria.t1.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.t1.resourceKey=**/*_test.go

# S1186 — empty function body in tests (httptest mocks)
sonar.issue.ignore.multicriteria.t2.ruleKey=go:S1186
sonar.issue.ignore.multicriteria.t2.resourceKey=**/*_test.go

# S100 — function naming (Go test names use underscores)
sonar.issue.ignore.multicriteria.t3.ruleKey=go:S100
sonar.issue.ignore.multicriteria.t3.resourceKey=**/*_test.go

# S3776 — cognitive complexity in test helpers
sonar.issue.ignore.multicriteria.t4.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.t4.resourceKey=**/*_test.go

# =============================================================================
# Rule Exclusions — Global (all Go files)
# =============================================================================

# S1135: "Complete the task associated to this TODO comment"
# TODO and FIXME annotations are standard practice in all codebases including
# Go's own standard library. They serve as tracking mechanisms, not quality
# issues. Project uses ticket references in TODOs for tracking.
sonar.issue.ignore.multicriteria.g1.ruleKey=go:S1135
sonar.issue.ignore.multicriteria.g1.resourceKey=**/*.go

# S3776: "Refactor this method to reduce its Cognitive Complexity"
# Go option-builder functions that map input struct fields to API option structs
# use many `if field != zero { opts.Field = value }` branches. Each branch is a
# trivial null-check + assignment, but the sum exceeds the threshold of 15.
# This is idiomatic Go for configuration/options building (see Go stdlib
# http.Server, tls.Config, etc.). Refactoring into sub-functions harms
# readability without improving maintainability.
sonar.issue.ignore.multicriteria.g2.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.g2.resourceKey=**/*.go
